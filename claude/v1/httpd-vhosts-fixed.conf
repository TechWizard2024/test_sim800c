<VirtualHost *:80>
    ServerName test-sim800c.lan
    DocumentRoot "C:/xampp/htdocs/aa_Toolbox/test_sim800c/claude/v1/web"
    <Directory "C:/xampp/htdocs/aa_Toolbox/test_sim800c/claude/v1/web">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # IMPORTANT: Le proxy WebSocket doit etre AVANT le proxy /api
    # Proxy WebSocket vers l'API Go (chemin complet /api/ws)
    ProxyPass /api/ws ws://localhost:8082/api/ws
    ProxyPassReverse /api/ws ws://localhost:8082/api/ws
    
    # Proxy REST vers l'API Go
    ProxyPass /api http://localhost:8082/api
    ProxyPassReverse /api http://localhost:8082/api
    
    ErrorLog "logs/sim800c_error.log"
    CustomLog "logs/sim800c_access.log" common
</VirtualHost>
